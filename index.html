<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sign Studio | Каталог вывесок</title>
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a192f; /* глубокий синий */
            color: #ffffff;
            line-height: 1.5;
        }

        /* Красно-бело-синяя цветовая схема */
        :root {
            --blue-dark: #0a192f;
            --blue-medium: #173a6d;
            --blue-light: #2c5a9c;
            --red-accent: #e31b23;
            --red-dark: #b01018;
            --white: #ffffff;
            --off-white: #f4f6f9;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Шапка */
        .header {
            padding: 32px 0 20px;
            border-bottom: 3px solid var(--red-accent);
            margin-bottom: 40px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #aaccff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .logo-area .sub {
            font-size: 1rem;
            font-weight: 500;
            color: var(--red-accent);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .header-contact {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            padding: 14px 28px;
            border-radius: 60px;
            border: 1px solid rgba(227, 27, 35, 0.5);
            font-weight: 600;
            font-size: 1.2rem;
        }

        .header-contact i {
            color: var(--red-accent);
            margin-right: 10px;
        }

        .tagline {
            font-size: 1.3rem;
            margin-top: 16px;
            color: #ccddf8;
            font-weight: 400;
        }

        .tagline strong {
            color: var(--white);
            font-weight: 700;
        }

        /* Секция с карточками */
        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
        }
        .section-title span {
            background: var(--red-accent);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-left: 18px;
            color: white;
            font-weight: 600;
        }
        .section-title i {
            color: var(--red-accent);
            margin-right: 14px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 30px -8px rgba(0,0,0,0.4);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -8px rgba(227, 27, 35, 0.3);
            border-color: var(--red-accent);
        }

        .card-img {
            height: 170px;
            background: linear-gradient(145deg, var(--blue-medium) 0%, #102a44 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 3.5rem;
            border-bottom: 4px solid var(--red-accent);
        }

        .card-content {
            padding: 22px 20px 24px;
            background: var(--white);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-sub {
            font-size: 0.9rem;
            color: var(--red-accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-desc {
            color: #334e68;
            font-size: 0.95rem;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px dashed #cbd5e1;
            padding-top: 16px;
            margin-top: auto;
        }

        .badge {
            background: var(--blue-dark);
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--red-accent);
            color: var(--red-accent);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: var(--red-accent);
            color: white;
        }

        .btn-solid {
            background: var(--red-accent);
            color: white;
            border: none;
            padding: 14px 34px;
            font-size: 1.2rem;
            box-shadow: 0 8px 18px rgba(227,27,35,0.3);
        }

        .btn-solid:hover {
            background: var(--red-dark);
            transform: scale(1.02);
        }

        /* CTA секция */
        .cta-section {
            background: linear-gradient(135deg, var(--blue-medium) 0%, #0a1e33 100%);
            border-radius: 40px;
            padding: 48px 40px;
            margin: 50px 0 70px;
            border: 1px solid rgba(227,27,35,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }

        .cta-text h3 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }
        .cta-text p {
            font-size: 1.1rem;
            color: #bdd3f0;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #8899bb;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* адаптив */
        @media (max-width: 680px) {
            .header-top {
                flex-direction: column;
                align-items: start;
            }
            .logo-area h1 {
                font-size: 2.2rem;
            }
            .cta-section {
                padding: 30px 24px;
            }
            .section-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="header-top">
                <div class="logo-area">
                    <div class="sub">изготовление с 2015</div>
                    <h1>3D SIGN <span style="color:var(--red-accent);">•</span> STUDIO</h1>
                </div>
                <div class="header-contact">
                    <i class="fas fa-phone-alt"></i> +7 (800) 555-34-45
                </div>
            </div>
            <div class="tagline">
                <strong>Объёмные вывески</strong> премиум-класса • от дизайна до монтажа
            </div>
        </header>

        <!-- Секция "Наши шаблоны и решения" -->
        <div class="section-title">
            <i class="fas fa-cubes"></i> Каталог решений 
            <span>15+ видов</span>
        </div>

        <!-- Сетка карточек с расшифрованными названиями -->
        <div class="card-grid" id="catalogGrid">
            <!-- Карточки будут сгенерированы из JS, но можно и статично, сделаем статично для простоты -->
        </div>

        <!-- CTA блок -->
        <div class="cta-section">
            <div class="cta-text">
                <h3>Готовы обсудить проект?</h3>
                <p>Бесплатный дизайн-макет и расчёт за 24 часа</p>
            </div>
            <a href="#" class="btn btn-solid"><i class="fas fa-pen-ruler" style="margin-right: 10px;"></i>Заказать вывеску</a>
        </div>

        <footer class="footer">
            © 2026 3D Sign Studio. Все права защищены. Красный · Белый · Синий.
        </footer>
    </div>

    <script>
        (function() {
            // Список шаблонов из названий файлов, расшифровка и описание
            const templates = [
                {
                    file: "advertising designs.png",
                    title: "Рекламные конструкции",
                    desc: "Комплексные решения для наружной рекламы: щиты, стелы, пилоны.",
                    icon: "fa-bullhorn",
                    category: "Наружная реклама"
                },
                {
                    file: "banners.png",
                    title: "Баннеры",
                    desc: "Широкоформатная печать, баннерные сетки, виниловые полотна.",
                    icon: "fa-flag",
                    category: "Печать"
                },
                {
                    file: "car branding.png",
                    title: "Брендирование авто",
                    desc: "Оклейка плёнкой, объёмные логотипы на транспорт.",
                    icon: "fa-truck",
                    category: "Транспорт"
                },
                {
                    file: "console signboard.png",
                    title: "Консольные вывески",
                    desc: "Вывески перпендикулярно фасаду, привлекают внимание с тротуара.",
                    icon: "fa-square",
                    category: "Вывески"
                },
                {
                    file: "interior design_navigation.png",
                    title: "Интерьерная навигация",
                    desc: "Таблички, указатели, навигационные стойки в едином стиле.",
                    icon: "fa-signs-post",
                    category: "Интерьер"
                },
                {
                    file: "neon signs.png",
                    title: "Неоновые вывески",
                    desc: "Гибкий неон, классический стеклянный неон, эффектный декор.",
                    icon: "fa-lightbulb",
                    category: "Неон"
                },
                {
                    file: "pseudo volumetric letters.png",
                    title: "Псевдообъёмные буквы",
                    desc: "Лёгкие и бюджетные объёмные буквы из ПВХ/акрила без подсветки.",
                    icon: "fa-font",
                    category: "Объёмные буквы"
                },
                {
                    file: "roof installations.png",
                    title: "Крышные установки",
                    desc: "Крупногабаритные конструкции для размещения на кровле зданий.",
                    icon: "fa-building",
                    category: "Крышная реклама"
                },
                {
                    file: "shop window design.png",
                    title: "Оформление витрин",
                    desc: "Аппликации, тонировка, объёмные элементы в витринах.",
                    icon: "fa-store",
                    category: "Витрины"
                },
                {
                    file: "three-dimensional letters.png",
                    title: "Объёмные буквы",
                    desc: "Классические 3D буквы с лицевой подсветкой или без.",
                    icon: "fa-cube",
                    category: "3D буквы"
                },
                {
                    file: "volumetric letters with pixel backlighting.png",
                    title: "Буквы с пиксельной подсветкой",
                    desc: "Динамическая RGB-подсветка, эффект бегущих огней.",
                    icon: "fa-gripfire",
                    category: "LED буквы"
                },
                {
                    file: "volumetric light boxes.png",
                    title: "Объёмные лайтбоксы",
                    desc: "Световые короба с лицевой подсветкой и объёмным эффектом.",
                    icon: "fa-braille",
                    category: "Лайтбоксы"
                }
            ];

            // Ещё можно добавить карточки для "console signboard" уже есть, "car branding" и т.д.
            // Проверим, что все 12 позиций соответствуют списку (исключая логотипы и фон)
            
            const grid = document.getElementById('catalogGrid');
            
            templates.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // иконка для карточки
                const iconHtml = `<i class="fas ${item.icon}"></i>`;
                
                card.innerHTML = `
                    <div class="card-img">
                        ${iconHtml}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-sub"><i class="fas fa-tag"></i> ${item.category}</div>
                        <div class="card-desc">${item.desc}</div>
                        <div class="card-footer">
                            <span class="badge">от 5 дней</span>
                            <a href="#" class="btn">Подробнее</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Добавим пару дополнительных (из списка были logo3D, mobile-logo, фон2 - их не включаем)
            // Но можно добавить карточку "Индивидуальный дизайн" как отдельную, но не обязательно.
        })();
    </script>
    <!-- Небольшой фикс для красоты: если нужно, чтобы все карточки были кликабельны кнопки "Подробнее" -->
    <script>
        // Просто заглушка для кнопок
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📞 Свяжитесь с нами для консультации: ???');
            });
        });
    </script>
</body>
</html>
