<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sign Studio | Вывески и реклама</title>
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome (для иконок, но не критично) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a1a2f; /* глубокий синий, запасной */
            color: #ffffff;
            line-height: 1.5;
            /* Фоновое изображение из репозитория */
            background-image: url('./фон2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* затемнение для читаемости текста поверх фона */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.75); /* синий оттенок */
            z-index: -1;
        }

        /* Красно-бело-синие акценты */
        :root {
            --blue-dark: #0a192f;
            --blue-medium: #173a6d;
            --blue-light: #2c5a9c;
            --red-accent: #e31b23;
            --red-dark: #b01018;
            --white: #ffffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        /* Шапка с логотипами */
        .header {
            padding: 24px 0 16px;
            border-bottom: 3px solid var(--red-accent);
            margin-bottom: 32px;
            backdrop-filter: blur(4px);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            height: 70px;
            width: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .logo-text h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #cce0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo-text .sub {
            color: var(--red-accent);
            font-weight: 600;
            letter-spacing: 3px;
        }

        .header-contact {
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(8px);
            padding: 14px 28px;
            border-radius: 60px;
            border: 1px solid rgba(227, 27, 35, 0.7);
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
        }

        .tagline {
            font-size: 1.2rem;
            margin-top: 16px;
            color: #e0ecff;
        }

        /* Сетка карточек с изображениями */
        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 40px 0 28px;
            display: flex;
            align-items: center;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .section-title span {
            background: var(--red-accent);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-left: 18px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 30px -5px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 40px -8px rgba(227, 27, 35, 0.5);
            border-color: var(--red-accent);
        }

        .card-img {
            height: 180px;
            background-color: #102a44;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--red-accent);
            padding: 10px;
        }

        .card-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .card-content {
            padding: 22px 20px 24px;
            background: white;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 6px;
        }

        .card-sub {
            color: var(--red-accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .card-desc {
            color: #2a405c;
            font-size: 0.95rem;
            margin-bottom: 18px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px dashed #a0b8cc;
            padding-top: 16px;
        }

        .badge {
            background: var(--blue-dark);
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--red-accent);
            color: var(--red-accent);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--red-accent);
            color: white;
        }

        .btn-solid {
            background: var(--red-accent);
            color: white;
            border: none;
            padding: 16px 38px;
            font-size: 1.2rem;
            box-shadow: 0 8px 18px rgba(227,27,35,0.4);
        }

        .cta-section {
            background: rgba(23, 58, 109, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 48px 40px;
            margin: 40px 0 60px;
            border: 1px solid rgba(227,27,35,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .cta-text h3 {
            font-size: 2rem;
            font-weight: 700;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #b0c7e0;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        @media (max-width: 680px) {
            .logo-area {
                flex-direction: column;
                align-items: flex-start;
            }
            .cta-section {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка с реальными логотипами из репозитория -->
        <header class="header">
            <div class="header-top">
                <div class="logo-area">
                    <!-- Основной логотип -->
                    <img src="./logo3D_new.png" alt="3D Sign Studio" class="logo-img" style="height: 65px;">
                    <!-- Можно добавить черную версию как вариант, но основной цветной уже есть -->
                    <div class="logo-text">
                        <div class="sub">изготовление с 2015</div>
                        <h1>3D SIGN STUDIO</h1>
                    </div>
                </div>
                <div class="header-contact">
                    <i class="fas fa-phone-alt" style="margin-right: 10px;"></i> +7 (800) 555-34-45
                </div>
            </div>
            <div class="tagline">
                <strong>Объёмные вывески</strong> · дизайн, производство, монтаж
            </div>
        </header>

        <!-- Секция с карточками, где используются изображения из списка -->
        <div class="section-title">
            <i class="fas fa-images" style="margin-right: 15px; color: var(--red-accent);"></i> 
            Наши решения 
            <span>12 направлений</span>
        </div>

        <div class="card-grid" id="catalogGrid"></div>

        <!-- CTA блок -->
        <div class="cta-section">
            <div class="cta-text">
                <h3>Нужна вывеска под ключ?</h3>
                <p>Рассчитаем стоимость за 1 час, подготовим макет</p>
            </div>
            <a href="#" class="btn btn-solid"><i class="fas fa-pen-ruler" style="margin-right: 12px;"></i>Заказать звонок</a>
        </div>

        <footer class="footer">
            © 2026 3D Sign Studio.
        </footer>
    </div>

    <script>
        (function() {
            // Массив с данными из списка файлов + описания
            const services = [
                {
                    file: "advertising designs.png",
                    title: "Рекламные конструкции",
                    desc: "Комплексные решения: стелы, пилоны, щиты.",
                    category: "Наружная реклама",
                    iconFallback: "fa-bullhorn"
                },
                {
                    file: "banners.png",
                    title: "Баннеры",
                    desc: "Широкоформатная печать, баннерная сетка.",
                    category: "Печать",
                    iconFallback: "fa-flag"
                },
                {
                    file: "car branding.png",
                    title: "Брендирование авто",
                    desc: "Оклейка, объёмные логотипы на транспорт.",
                    category: "Транспорт",
                    iconFallback: "fa-truck"
                },
                {
                    file: "console signboard.png",
                    title: "Консольные вывески",
                    desc: "Перпендикулярные фасаду конструкции.",
                    category: "Вывески",
                    iconFallback: "fa-square"
                },
                {
                    file: "interior design_navigation.png",
                    title: "Интерьерная навигация",
                    desc: "Таблички, указатели, стойки.",
                    category: "Интерьер",
                    iconFallback: "fa-signs-post"
                },
                {
                    file: "neon signs.png",
                    title: "Неоновые вывески",
                    desc: "Гибкий неон, классический стеклянный.",
                    category: "Неон",
                    iconFallback: "fa-lightbulb"
                },
                {
                    file: "pseudo volumetric letters.png",
                    title: "Псевдообъёмные буквы",
                    desc: "Бюджетный вариант 3D букв.",
                    category: "Объём",
                    iconFallback: "fa-font"
                },
                {
                    file: "roof installations.png",
                    title: "Крышные установки",
                    desc: "Крупные конструкции на кровле.",
                    category: "Крыша",
                    iconFallback: "fa-building"
                },
                {
                    file: "shop window design.png",
                    title: "Оформление витрин",
                    desc: "Плёнка, аппликации, объём в витрине.",
                    category: "Витрины",
                    iconFallback: "fa-store"
                },
                {
                    file: "three-dimensional letters.png",
                    title: "Объёмные буквы",
                    desc: "Классика: акрил, металл, ПВХ.",
                    category: "3D буквы",
                    iconFallback: "fa-cube"
                },
                {
                    file: "volumetric letters with pixel backlighting.png",
                    title: "Пиксельная подсветка",
                    desc: "RGB буквы с эффектами.",
                    category: "LED",
                    iconFallback: "fa-gripfire"
                },
                {
                    file: "volumetric light boxes.png",
                    title: "Объёмные лайтбоксы",
                    desc: "Световые короба с глубиной.",
                    category: "Лайтбокс",
                    iconFallback: "fa-braille"
                }
            ];

            const grid = document.getElementById('catalogGrid');
            
            services.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Создаём карточку с изображением
                card.innerHTML = `
                    <div class="card-img">
                        <img src="./${item.file}" alt="${item.title}" loading="lazy" 
                             onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas ${item.iconFallback}\' style=\'font-size: 48px; color: white;\'></i>'">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-sub"><i class="fas fa-tag"></i> ${item.category}</div>
                        <div class="card-desc">${item.desc}</div>
                        <div class="card-footer">
                            <span class="badge">от 5 дней</span>
                            <a href="#" class="btn">Подробнее</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Добавим fallback для случая, если изображение не загрузится (на всякий)
            // Уже обработано onerror в img, но также можно заменить на иконку FontAwesome.
        })();
    </script>
    <!-- Обработчик кнопок -->
    <script>
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('📞 Оставьте заявку по телефону: ???\nили напишите нам на почту.');
            });
        });
    </script>
    <!-- Дополнительно: мобильный логотип можно использовать в адаптиве, но не обязательно -->
</body>
</html>
